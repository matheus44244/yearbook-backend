name: Smoke Test

on: [push]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install
      - name: Verifica sintaxe de todos os arquivos JS
        run: find . -name '*.js' -not -path './node_modules/*' -exec node --check {} +
